<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="%BASE_URL%images/tamil_school_logo.webp" />

    <!-- Single Page Apps for GitHub Pages Redirect Handler -->
    <script type="text/javascript">
        (function (l) {
            if (l.search[1] === 'p') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&')
                }).reduce(function (r, s) {
                    var g = s.split('=');
                    r[g[0]] = g[1];
                    return r;
                }, {});
                if (decoded.p !== undefined) {
                    window.history.replaceState(null, null,
                        l.pathname.slice(0, -1) + (decoded.p ? '/' + decoded.p : '') +
                        (decoded.q ? '?' + decoded.q : '') +
                        l.hash
                    );
                }
            }
        }(window.location));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Learn Tamil language and Indian culture at Peninsula Tamil School in San Mateo. Sunday classes for all ages at Foster City Recreation Center." />
    <title>Peninsula Tamil School | Tamil Language Classes in San Mateo, CA</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700;900&display=swap"
        rel="stylesheet">
</head>
